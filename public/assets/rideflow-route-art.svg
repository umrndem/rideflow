<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">RideFlow route art</title>
  <desc id="desc">Abstract night city map with a highlighted ride route and moving car shape.</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="2"/>
    </pattern>
    <linearGradient id="route" x1="100" x2="660" y1="270" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset=".46" stop-color="#ffdf32"/>
      <stop offset="1" stop-color="#ff8a61"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" values="1 0 0 0 1 0 1 0 0 .87 0 0 1 0 .2 0 0 0 .65 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="760" height="420" rx="28" fill="#111"/>
  <rect width="760" height="420" fill="url(#grid)"/>
  <path d="M90 318C172 254 225 288 303 229c60-45 72-117 149-118 68-1 93 55 150 38 30-9 51-34 68-57" fill="none" stroke="#2e2e2e" stroke-width="54" stroke-linecap="round"/>
  <path d="M90 318C172 254 225 288 303 229c60-45 72-117 149-118 68-1 93 55 150 38 30-9 51-34 68-57" fill="none" stroke="url(#route)" stroke-width="13" stroke-linecap="round" filter="url(#glow)"/>
  <g transform="translate(336 186)">
    <rect x="-45" y="-24" width="90" height="48" rx="15" fill="#ffdf32"/>
    <path d="M-27 1h54l-8-19h-38L-27 1Z" fill="#111"/>
    <circle cx="-25" cy="26" r="9" fill="#111"/>
    <circle cx="25" cy="26" r="9" fill="#111"/>
  </g>
  <g transform="translate(94 318)">
    <circle r="26" fill="#16895f"/>
    <circle r="10" fill="#fff"/>
  </g>
  <g transform="translate(670 92)">
    <circle r="26" fill="#d84d3f"/>
    <circle r="10" fill="#fff"/>
  </g>
  <g fill="#ffffff" opacity=".20">
    <rect x="146" y="80" width="58" height="78" rx="10"/>
    <rect x="224" y="54" width="74" height="104" rx="10"/>
    <rect x="520" y="238" width="62" height="96" rx="10"/>
    <rect x="604" y="220" width="44" height="114" rx="10"/>
  </g>
</svg>
